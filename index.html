<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Primary SEO -->
    <title>Arcane Vault — MTG Companion App | Search, Build Decks & Track Cards</title>
    <meta name="description" content="Your all-in-one Magic: The Gathering companion. Search 40,000+ cards, build decks with analytics, simulate opening hands, track your collection's value, and evaluate trades — free on web and mobile." />
    <meta name="keywords" content="MTG, Magic The Gathering, deck builder, card search, collection tracker, mana curve, trade tool, commander, standard, modern, TCGplayer, Cardmarket" />
    <meta name="author" content="Kation Technologies" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://arcane-vault.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arcane-vault.vercel.app/" />
    <meta property="og:title" content="Arcane Vault — Your MTG Companion" />
    <meta property="og:description" content="Search every MTG card ever printed, build decks with live stats, simulate hands, track your collection, and evaluate trades. Free on web & mobile." />
    <meta property="og:image" content="https://arcane-vault.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Arcane Vault — MTG Companion App with Card Search, Deck Builder, Simulator, Collection Tracker, and Trade Tool" />
    <meta property="og:site_name" content="Arcane Vault" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arcane Vault — Your MTG Companion" />
    <meta name="twitter:description" content="Search 40K+ MTG cards, build decks, simulate hands, track collection value, evaluate trades. Free." />
    <meta name="twitter:image" content="https://arcane-vault.vercel.app/og-image.png" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#0C0E14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arcane Vault" />
    <meta name="application-name" content="Arcane Vault" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- MTG-themed typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Arcane Vault",
      "alternateName": "Arcane Vault MTG",
      "description": "All-in-one Magic: The Gathering companion app. Search cards, build decks, simulate hands, track collection value, and evaluate trades.",
      "url": "https://arcane-vault.vercel.app/",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Kation Technologies"
      },
      "screenshot": "https://arcane-vault.vercel.app/og-image.png",
      "featureList": "Card Search, Deck Builder, Hand Simulator, Collection Tracker, Trade Evaluator"
    }
    </script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { background: #0C0E14; overflow-x: hidden; }
      #root { min-height: 100dvh; }

      /* Personality animations */
      @keyframes mythicPulse {
        0%, 100% { filter: brightness(1) drop-shadow(0 0 3px rgba(240,104,52,.25)); }
        50% { filter: brightness(1.12) drop-shadow(0 0 10px rgba(240,104,52,.5)); }
      }
      @keyframes foilSweep {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes collectBurst {
        0% { opacity: 1; transform: scale(.5); }
        50% { opacity: .5; transform: scale(1.5); }
        100% { opacity: 0; transform: scale(2.5); }
      }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(201,169,110,.1); }
        50% { box-shadow: 0 0 40px rgba(201,169,110,.25); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); opacity: .04; }
        50% { transform: translateY(-30px) scale(1.15); opacity: .08; }
      }
      @keyframes blindEternities {
        0%, 100% { box-shadow: inset 0 0 100px 30px rgba(15,8,30,.5); }
        33% { box-shadow: inset 0 0 100px 30px rgba(8,15,30,.5); }
        66% { box-shadow: inset 0 0 100px 30px rgba(15,12,8,.4); }
      }
      @keyframes shimmer {
        from { background-position: 200% 0; }
        to { background-position: -200% 0; }
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(-12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      @keyframes pulse {
        from { opacity: .4; width: 30%; }
        to { opacity: 1; width: 80%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
